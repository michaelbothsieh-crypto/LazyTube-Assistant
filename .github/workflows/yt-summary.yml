name: YouTube NotebookLM Summarizer

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install notebooklm-mcp-cli

      - name: Run summarizer
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || 5 }}
        run: |
          python main.py

      - name: Commit state files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 備份新的狀態文字
          NEW_LAST_CHECK="$(cat last_check.txt 2>/dev/null || echo '')"
          NEW_PROCESSED="$(cat processed_videos.txt 2>/dev/null || echo '')"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          # 還原狀態文字
          [ -n "$NEW_LAST_CHECK" ] && printf "%s\n" "$NEW_LAST_CHECK" > last_check.txt
          [ -n "$NEW_PROCESSED" ] && printf "%s\n" "$NEW_PROCESSED" > processed_videos.txt

          if git diff --quiet -- last_check.txt processed_videos.txt; then
            echo "狀態檔案無變更，略過提交。"
            exit 0
          fi

          git add last_check.txt processed_videos.txt
          git commit -m "chore: update summarizer state [skip ci]"
          git push origin HEAD:main
