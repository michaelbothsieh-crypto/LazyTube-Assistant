name: YouTube NotebookLM Summarizer

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install notebooklm-mcp-cli

      - name: Run summarizer
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || 5 }}
        run: |
          python main.py

      - name: Commit last_check.txt
        shell: bash
        run: |
          git config user.name "michael"
          git config user.email "michaelbothsieh@gmail.com"

          NEW_LAST_CHECK="$(cat last_check.txt)"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          printf "%s\n" "$NEW_LAST_CHECK" > last_check.txt

          if git diff --quiet -- last_check.txt; then
            echo "last_check.txt 沒有變更，略過提交。"
            exit 0
          fi

          git add last_check.txt
          git commit -m "Update last_check.txt [skip ci]"
          git push origin HEAD:main
