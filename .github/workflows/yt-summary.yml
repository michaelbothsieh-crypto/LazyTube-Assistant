name: YouTube NotebookLM Summarizer

on:
  schedule:
    - cron: '0 0,2,4,6,8,10,12,14,22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install notebooklm-mcp-cli==0.4.6

      - name: Restore state from Vercel Blob
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          python jobs/sync_helper.py restore

      - name: Patch Prompt for PoE (Surgical Edit)
        run: |
          # 潤飾後且包含遊戲名稱的客製化 Prompt
          CUSTOM_PROMPT="請針對這部《流亡黯道 (Path of Exile)》影片內容進行摘要，詳細列出流派機制、地圖策略與關鍵裝備，並指出影片獨特之處。請以繁體中文回覆，內容精煉且不超過 100 字。"
          
          # 使用 sed 動態修改程式碼中的預設 Prompt
          sed -i "s/請用繁體中文列出這部影片的 3 到 5 個核心重點，並加上影片標題/${CUSTOM_PROMPT}/g" app/notebook.py
          
          echo "✅ 已針對 PoE 自動任務套用客製化 Prompt"

      - name: Run summarizer
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || 10 }}
        run: |
          python jobs/main.py

      - name: Persist state to Vercel Blob
        if: always()
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          python jobs/sync_helper.py persist
