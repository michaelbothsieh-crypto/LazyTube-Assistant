name: YouTube NotebookLM Summarizer

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install notebooklm-mcp-cli

      - name: Restore state from Vercel Blob
        continue-on-error: true
        env:
          BLOB_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [ -n "$BLOB_TOKEN" ]; then
            echo "📥 正在從 Vercel Blob 恢復狀態..."
            # 取得檔案清單並過濾出最新的狀態檔 (Vercel Blob API 邏輯)
            # 簡化版：直接嘗試從已知路徑下載，若失敗則使用預設
            curl -s -H "Authorization: Bearer $BLOB_TOKEN" "https://blob.vercel-storage.com/state/last_check.txt" -o last_check.txt || echo "首次執行，跳過 last_check"
            curl -s -H "Authorization: Bearer $BLOB_TOKEN" "https://blob.vercel-storage.com/state/processed_videos.txt" -o processed_videos.txt || echo "首次執行，跳過 processed_videos"
          fi

      - name: Run summarizer
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || 5 }}
        run: |
          python main.py

      - name: Persist state to Vercel Blob
        if: always()
        env:
          BLOB_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [ -n "$BLOB_TOKEN" ]; then
            echo "📤 正在上傳狀態至 Vercel Blob..."
            # 使用 Vercel Blob PUT API
            # 注意：Vercel Blob 的標準 PUT API 需要指定檔名，這裡我們存放在 /state/ 路徑下
            [ -f last_check.txt ] && curl -s -X PUT -H "Authorization: Bearer $BLOB_TOKEN" -H "x-add-random-suffix: 0" --data-binary @last_check.txt "https://blob.vercel-storage.com/state/last_check.txt"
            [ -f processed_videos.txt ] && curl -s -X PUT -H "Authorization: Bearer $BLOB_TOKEN" -H "x-add-random-suffix: 0" --data-binary @processed_videos.txt "https://blob.vercel-storage.com/state/processed_videos.txt"
            echo "✅ 狀態同步完成。"
          fi
