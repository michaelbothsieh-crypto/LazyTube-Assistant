name: YouTube NotebookLM Summarizer

on:
  schedule:
    - cron: '0 * * * *'  # 每小時執行一次
  workflow_dispatch:      # 允許手動觸發

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予寫入權限，解決 403 錯誤
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 從 PyPI 安裝 notebooklm-mcp-cli（不依賴本地子資料夾）
        pip install notebooklm-mcp-cli

    - name: Run summarizer
      env:
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
        MAX_VIDEOS_PER_RUN: ${{ vars.MAX_VIDEOS_PER_RUN || 5 }}
      run: |
        python main.py

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update last_check.txt [skip ci]"
        file_pattern: 'last_check.txt'
        commit_user_name: "Michael"
        commit_user_email: "michael@example.com"
