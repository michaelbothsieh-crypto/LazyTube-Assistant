name: Slide On-Demand Generator

on:
  workflow_dispatch:
    inputs:
      url:
        description: '要轉換為簡報的來源 URL'
        required: true
        type: string
      prompt:
        description: '生成簡報的自訂指令 (Focus Topic)'
        required: false
        type: string
        default: ''
      chat_id:
        description: '回傳結果的 Telegram ID'
        required: true
        type: string
      message_id:
        description: '要刪除的「處理中」訊息 ID'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  slide-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install notebooklm-mcp-cli==0.4.5

    - name: Run Slide On-Demand Generator
      env:
        GITHUB_TOKEN: ${{ github.token }}
        BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        INPUT_MSG_ID: ${{ inputs.message_id }}
        INPUT_PROMPT: ${{ inputs.prompt }}
      run: |
        python on_demand_slide.py "${{ inputs.url }}" "${{ inputs.chat_id }}"
