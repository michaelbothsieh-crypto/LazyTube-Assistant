name: NLM On-Demand Query

on:
  workflow_dispatch:
    inputs:
      url:
        description: '要查詢的來源 URL'
        required: true
        type: string
      prompt:
        description: '自訂查詢 Prompt'
        required: false
        default: '請用繁體中文列出這部影片或這個來源的 5 個核心重點，並在最後加上一句話的總結。'
        type: string
      chat_id:
        description: '回傳結果的 Telegram Chat ID'
        required: true
        type: string

jobs:
  nlm-query:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install notebooklm-mcp-cli
      run: |
        pip install notebooklm-mcp-cli

    - name: Run NLM On-Demand Query
      env:
        NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_CHAT_ID: ${{ inputs.chat_id }}
      run: |
        python - <<'PYTHON_SCRIPT'
        import os
        import sys
        import base64
        import uuid
        import subprocess
        import re
        import requests

        AUTH_JSON_PATH = os.path.expanduser("~/.notebooklm-mcp-cli/auth.json")
        BOT_TOKEN      = os.environ["TELEGRAM_BOT_TOKEN"]
        CHAT_ID        = os.environ["INPUT_CHAT_ID"]
        URL            = os.environ["INPUT_URL"]
        PROMPT         = os.environ["INPUT_PROMPT"]
        NOTEBOOK_NAME  = f"NLM_Query_{uuid.uuid4().hex[:8].upper()}"

        def send_tg(text: str):
            url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
            resp = requests.post(url, json={
                "chat_id": CHAT_ID,
                "text": text,
                "parse_mode": "HTML",
                "disable_web_page_preview": True
            }, timeout=10)
            if resp.status_code != 200:
                print(f"[TG Error] {resp.status_code}: {resp.text}", file=sys.stderr)

        def run_nlm(*args):
            cmd = ["nlm", *args]
            print(f"[CMD] {' '.join(cmd)}")
            result = subprocess.run(cmd, capture_output=True, text=True)
            if result.stdout:
                print(f"[STDOUT] {result.stdout[:500]}")
            if result.stderr:
                print(f"[STDERR] {result.stderr[:500]}")
            return result

        cookie_b64 = os.environ.get("NLM_COOKIE_BASE64", "")
        if cookie_b64:
            os.makedirs(os.path.dirname(AUTH_JSON_PATH), exist_ok=True)
            with open(AUTH_JSON_PATH, "wb") as f:
                f.write(base64.b64decode(cookie_b64))
            print("✅ 已還原 NotebookLM 登入憑證")
        else:
            send_tg("❌ <b>任務失敗</b>：缺少 NLM_COOKIE_BASE64。")
            sys.exit(1)

        source_id = None
        notebook_created = False

        try:
            print(f"📁 建立臨時 Notebook：{NOTEBOOK_NAME}")
            result = run_nlm("notebook", "create", NOTEBOOK_NAME)
            if result.returncode != 0:
                raise RuntimeError(f"建立 Notebook 失敗")
            notebook_created = True

            print(f"🔗 新增來源：{URL[:80]}")
            add_result = run_nlm("source", "add", NOTEBOOK_NAME, "--url", URL)
            if add_result.returncode != 0:
                raise RuntimeError(f"新增來源失敗")

            combined = add_result.stdout + add_result.stderr
            match = re.search(r"Source ID:\s*([a-zA-Z0-9\-]+)", combined)
            source_id = match.group(1) if match else None
            print(f"📌 Source ID: {source_id or '(未解析到)'}")

            print(f"🤖 執行查詢...")
            query_args = ["query", NOTEBOOK_NAME, PROMPT]
            if source_id:
                query_args += ["-s", source_id]

            query_result = run_nlm(*query_args)
            if query_result.returncode != 0:
                raise RuntimeError(f"查詢失敗")

            summary = query_result.stdout.strip()
            if not summary:
                raise RuntimeError("回傳空白摘要")

            msg = (
                f"✅ <b>NotebookLM 分析完成</b>\n\n"
                f"🔗 來源：<code>{URL[:100]}</code>\n\n"
                f"📝 <b>摘要</b>\n{summary}"
            )
            send_tg(msg)
            print("✅ 已成功回傳摘要至 Telegram")

        except Exception as e:
            print(f"❌ 任務失敗: {e}", file=sys.stderr)
            send_tg(
                f"❌ <b>NotebookLM 任務失敗</b>\n\n"
                f"來源：<code>{URL[:100]}</code>\n"
                f"錯誤：{str(e)[:300]}"
            )
            sys.exit(1)

        finally:
            if notebook_created:
                print(f"🗑️ 清理臨時 Notebook：{NOTEBOOK_NAME}")
                del_result = run_nlm("notebook", "delete", NOTEBOOK_NAME, "--confirm")
                if del_result.returncode == 0:
                    print("✅ Notebook 已成功刪除")
                else:
                    print(f"⚠️ Notebook 刪除失敗（可手動清理）")

        PYTHON_SCRIPT
