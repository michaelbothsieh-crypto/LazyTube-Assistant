name: Podcast 財經分析掃描器

on:
  schedule:
    # 每天台北時間 09:00 執行（UTC 01:00）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支援手動觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # NLM 上傳轉錄 + query 需要較長時間
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore processed state from GitHub
        continue-on-error: true
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: |
          python jobs/podcast_sync_helper.py restore

      - name: Run podcast scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          # Redis — HTML 報告快取
          # 注意：不注入 APP_BASE_URL，讓 config.py 的 fallback 生效
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CUSTOM_PROMPT: "podcast"
          PODCAST_EPISODE_NUMBER: ""
          # PODCAST_RSS_URLS 不設定 → 自動使用訂閱清單
          # 若清單為空則不執行，避免誤推預設頻道
        run: |
          python jobs/podcast_scanner.py


      - name: Persist processed state to GitHub
        if: always()
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: |
          python jobs/podcast_sync_helper.py persist
