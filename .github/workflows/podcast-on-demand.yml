name: Podcast 即時分析 (On-Demand)

on:
  workflow_dispatch:
    inputs:
      rss_url:
        description: "RSS Feed URL"
        required: true
      mode:
        description: "latest=最新一集 / daily=所有新集數"
        default: "latest"
      episode_number:
        description: "指定集數編號（如 655、654），留空 = 最新一集"
        default: ""
      chat_id:
        description: "Telegram chat_id"
        required: true
      message_id:
        description: "Telegram pending message_id（完成後自動刪除）"
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore processed_podcasts state
        continue-on-error: true
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: python jobs/podcast_sync_helper.py restore

      - name: Run podcast analyzer
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NLM_COOKIE_BASE64: ${{ secrets.NLM_COOKIE_BASE64 }}
          CUSTOM_PROMPT: "finance"
          PODCAST_RSS_URLS: ${{ inputs.rss_url }}
          PODCAST_MODE: ${{ inputs.mode }}
          PODCAST_EPISODE_NUMBER: ${{ inputs.episode_number }}
          PODCAST_CHAT_ID: ${{ inputs.chat_id }}
          PODCAST_MESSAGE_ID: ${{ inputs.message_id }}
        run: python jobs/podcast_scanner.py

      - name: Persist state（僅 daily 模式才需要更新）
        if: always() && inputs.mode == 'daily'
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: python jobs/podcast_sync_helper.py persist
