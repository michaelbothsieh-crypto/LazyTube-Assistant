name: Master Scheduler

on:
  schedule:
    # ⚠️ 此 cron 由 jobs/update_cron.py 自動管理，請勿手動修改
    - cron: '5 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  master-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore state from GitHub
        continue-on-error: true
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: python jobs/sync_helper.py restore

      - name: Run Master Scheduler
        env:
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          GH_REPO_BRANCH: ${{ secrets.GH_REPO_BRANCH || 'main' }}
        run: python jobs/master_scheduler.py
