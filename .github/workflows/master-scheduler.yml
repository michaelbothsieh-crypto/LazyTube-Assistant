name: Master Scheduler

on:
  schedule:
    # 每個整點執行一次 (分 00, 小時 *)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  master-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Restore state from Vercel Blob
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: python sync_helper.py restore

      - name: Run Master Scheduler
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          GH_REPO_BRANCH: ${{ secrets.GH_REPO_BRANCH || 'main' }}
        run: python master_scheduler.py
