name: Master Scheduler

on:
  schedule:
    # 每 2 小時 :30 分執行，與 yt-summary (:00) 完全錯開避免搶 runner
    # 台北 06:30, 08:30, 10:30 ... 22:30
    - cron: '30 22,0,2,4,6,8,10,12,14 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  master-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Restore state from Vercel Blob
        continue-on-error: true
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: python jobs/sync_helper.py restore

      - name: Run Master Scheduler
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GH_PAT_WORKFLOW: ${{ secrets.GH_PAT_WORKFLOW }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          GH_REPO_BRANCH: ${{ secrets.GH_REPO_BRANCH || 'main' }}
        run: python jobs/master_scheduler.py
